name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact_name: autocommit
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact_name: autocommit
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact_name: autocommit
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact_name: autocommit.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.target }}

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: .
          key: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: autocommit-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/${{ matrix.artifact_name }}

  create-release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Package artifacts
        shell: bash
        run: |
          cd artifacts
          for dir in */; do
            target="${dir%/}"
            if [ "$target" = "autocommit-x86_64-pc-windows-msvc" ]; then
              cd "$target"
              zip -r "../autocommit-${target}.zip" .
              cd ..
            else
              cd "$target"
              tar czf "../autocommit-${target}.tar.gz" .
              cd ..
            fi
          done

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/autocommit-*.tar.gz
            artifacts/autocommit-*.zip
          generate_release_notes: true
